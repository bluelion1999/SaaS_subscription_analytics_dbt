version: 2

sources:
  - name: orbit
    database: orbit_analytics
    schema: raw
    tables:
    - name: raw_users
    - name: raw_subscriptions
      config:
        loaded_at_field: updated_at
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 72, period: hour}
    - name: raw_product_events
      config:
        loaded_at_field: event_timestamp
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 72, period: hour}
    - name: raw_invoices
